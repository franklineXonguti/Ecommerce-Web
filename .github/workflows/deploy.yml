name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/production.txt
    
    - name: Run tests
      working-directory: ./backend
      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        DJANGO_SETTINGS_MODULE: smartcommerce.settings.production
      run: |
        pytest --verbose
    
    - name: Build Docker image
      working-directory: ./backend
      run: |
        docker build -t smartcommerce:${{ github.ref_name }} .
    
    - name: Deploy notification
      run: |
        echo "Deployment of version ${{ github.ref_name }} completed successfully"
        echo "Remember to:"
        echo "1. Push Docker image to registry"
        echo "2. Update production environment"
        echo "3. Run database migrations"
        echo "4. Restart services"
